<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- resume sheet + a passed-ATS checkmark badge sir — the two things this app actually does -->
  <rect width="64" height="64" rx="14" fill="#000814"/>
  <!-- document body -->
  <rect x="16" y="10" width="26" height="34" rx="3" fill="#FFD60A"/>
  <!-- text lines on the resume -->
  <rect x="20" y="17" width="14" height="2.6" rx="1.3" fill="#000814"/>
  <rect x="20" y="23" width="18" height="2.6" rx="1.3" fill="#000814"/>
  <rect x="20" y="29" width="10" height="2.6" rx="1.3" fill="#000814"/>
  <rect x="20" y="35" width="15" height="2.6" rx="1.3" fill="#000814"/>
  <!-- score/check badge overlapping the corner -->
  <circle cx="44" cy="42" r="13" fill="#2CD98C" stroke="#000814" stroke-width="2.5"/>
  <path d="M38.5 42.2l3.8 3.8 8-8.4" fill="none" stroke="#000814" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
