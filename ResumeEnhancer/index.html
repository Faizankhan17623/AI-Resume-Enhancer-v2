<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AI-powered ATS resume reviewer — upload your resume, paste the job description, get an honest score with line-by-line fixes." />
    <title>ResumeEnhancer — Beat the ATS</title>
    <script>
      // applied before first paint sir — avoids a flash of the wrong theme on load
      (function () {
        var saved = localStorage.getItem('theme');
        var dark = saved === 'dark' || (saved !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
